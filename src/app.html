<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap"
		/>
		<script>
			// No-flash: apply persisted theme + lang before first paint.
			(function () {
				try {
					var t = localStorage.getItem('theme');
					if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					if (t === 'dark') document.documentElement.classList.add('dark');
					var l = localStorage.getItem('locale');
					if (l === 'en' || l === 'de') document.documentElement.lang = l;
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

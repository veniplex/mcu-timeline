name: 🐞 Bug report
description: Something in the app is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Device / browser
      placeholder: "iPhone 15, Safari 17 — or Chrome 120 on Windows"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / console errors (optional)
